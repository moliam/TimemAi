kind: tool
id: run_bash
binding_type: builtin
binding_name: run_bash
requires_host: local_command_execution
summary: Run local shell commands.
prompt_synopsis: |
  run_bash cmd=<shell_command> [timeout_ms=<n|-1>] [background=true|mode=background]
  run_bash loop_cmd=<check_command> interval_ms=<n> timeout_ms=<total_wait_ms|-1> [check_timeout_ms=<n>]
description: |
  `run_bash` runs a shell command on the local machine and collects bounded
  evidence from the command result. It supports foreground, background, and
  polling execution. Bash action is very powerful through which you can execute lots of programs residing in user's system environment.
  Accomplish your goals by intelligently choosing and organizing your commands. Revert tmp changes in user's environment in a timely manner.
  Use timeout_ms=-1 only when the user explicitly wants the command to block
  without a runtime timeout. Do not put long sleeps in cmd. For waiting on
  external state, use loop_cmd with interval_ms. The loop command is re-run
  until it exits with code 0 or timeout_ms total wait budget is reached. For
  long local work that should keep running across later turns, use
  background=true and shell_job_status.
prompt_input: |
  Use cmd for a shell command. Optional: timeout_ms, background=true or
  mode=background. Use loop_cmd with interval_ms for polling/waiting. loop_cmd
  is run repeatedly until it exits with code 0 or timeout_ms total wait budget
  is reached. check_timeout_ms is the per-check command timeout.
prompt_result: |
  Foreground returns status and bounded output. Background returns job_id; use
  shell_job_status with that job_id and your chosen timeout_ms to wait/check.
  Polling mode returns mode=poll, state=finished|timeout|cancelled, attempts,
  elapsed_ms, last_status, and bounded last output.
input_schema: |
  {
    "type": "object",
    "properties": {
      "cmd": {"type": "string", "description": "Shell command to execute."},
      "loop_cmd": {"type": "string", "description": "Polling check command. Runtime re-runs it until it exits with code 0."},
      "timeout_ms": {"type": "integer", "description": "Foreground wait budget, total polling wait budget when loop_cmd is present, or -1 for no runtime timeout."},
      "check_timeout_ms": {"type": "integer", "description": "Per-check timeout in polling mode."},
      "interval_ms": {"type": "integer", "description": "Polling interval. Requires loop_cmd."},
      "background": {"type": "boolean", "description": "When true, return a job_id instead of blocking."},
      "mode": {"type": "string", "enum": ["foreground", "background"], "description": "Execution mode alias."}
    },
    "x-required-any": [["cmd", "loop_cmd"]]
  }
output_schema: |
  {
    "type": "object",
    "properties": {
      "command": {"type": "string", "description": "Command actually executed."},
      "mode": {"type": "string", "description": "poll when interval_ms was used."},
      "state": {"type": "string", "description": "Polling state: finished|timeout|cancelled."},
      "attempts": {"type": "integer", "description": "Polling attempts."},
      "elapsed_ms": {"type": "integer", "description": "Polling elapsed time."},
      "last_status": {"type": "integer", "description": "Last observed polling exit code."},
      "status": {"type": "integer", "description": "Process exit code for foreground success."},
      "output": {"type": "string", "description": "Bounded stdout/stderr text for foreground execution."},
      "job_id": {"type": "string", "description": "Background job id when background=true."},
      "pid": {"type": "integer", "description": "Background process id."},
      "output_file": {"type": "string", "description": "Path where background output is stored."},
      "status_file": {"type": "string", "description": "Path where background exit status is stored."},
      "approval_status": {"type": "string", "enum": ["approved_by_user", "denied_by_user"], "description": "Approval result."},
      "error": {"type": "string", "description": "command_required|command_too_long|cmd_and_loop_cmd_conflict|long_sleep_in_foreground_command|loop_cmd_required_for_polling|interval_ms_required_for_loop_cmd|poll_mode_cannot_be_background|timeout|command_failed|background_spawn_failed|cancelled"}
    }
  }
example_json: |
  {
    "action": "run_bash",
    "intent": "Count files in the current folder.",
    "args": {
      "cmd": "rg --files | wc -l",
      "timeout_ms": 5000
    }
  }

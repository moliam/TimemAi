kind: tool
id: run_bash
binding_type: builtin
binding_name: run_bash
summary: Run local shell commands.
prompt_synopsis: |
  run_bash command=<shell_command> [timeout_ms=<n>] [background=true|mode=background]
description: |
  `run_bash` provides you the capability to run a shell command on the local machine and collect the output of the command. This capability is very powerful, such as running bin, reading/editing file, almost everything. Supports foreground and background execution. With status=finished and final_answer, the response may include one final run_bash command; that command's exit code decides whether final_answer is shown.
prompt_input: |
  Use command for the shell command. Optional: timeout_ms, background=true or
  mode=background. If status=finished and final_answer includes one final
  run_bash command, keep it foreground-only and use the command exit code as the
  final completion check.
prompt_result: |
  Foreground returns status and bounded output. Background returns job_id; use
  shell_job_status with that job_id and your chosen timeout_ms to wait/check.
  With status=finished and final_answer, the final command exit code determines
  whether to really finish or continue. If the command exits nonzero, runtime
  ignores final_answer and returns the command output for continued work.
input_schema: |
  {
    "type": "object",
    "properties": {
      "command": {"type": "string", "description": "Shell command to execute."},
      "timeout_ms": {"type": "integer", "description": "Foreground wait budget in milliseconds."},
      "background": {"type": "boolean", "description": "When true, return a job_id instead of blocking."},
      "mode": {"type": "string", "enum": ["foreground", "background"], "description": "Execution mode alias."}
    },
    "required": ["command"]
  }
output_schema: |
  {
    "type": "object",
    "properties": {
      "command": {"type": "string", "description": "Command actually executed."},
      "status": {"type": "integer", "description": "Process exit code for foreground success."},
      "output": {"type": "string", "description": "Bounded stdout/stderr text for foreground execution."},
      "job_id": {"type": "string", "description": "Background job id when background=true."},
      "pid": {"type": "integer", "description": "Background process id."},
      "output_file": {"type": "string", "description": "Path where background output is stored."},
      "status_file": {"type": "string", "description": "Path where background exit status is stored."},
      "approval_status": {"type": "string", "enum": ["approved_by_user", "denied_by_user"], "description": "Approval result."},
      "error": {"type": "string", "description": "command_required|command_too_long|timeout|command_failed|background_spawn_failed"}
    }
  }
example_json: |
  {
    "action": "run_bash",
    "intent": "Count files in the current folder.",
    "args": {
      "command": "rg --files | wc -l",
      "timeout_ms": 5000
    }
  }

kind: tool
id: tool_job_status
binding_type: builtin
binding_name: tool_job_status
requires_host: local_command_execution
summary: Check a background registered tool job.
description: |
  Check or cancel a background job started by a registered command-bound tool.
prompt_input: |
  Requires job_id from a previous registered tool result. Use op=status to
  check, or op=cancel to stop the job. op defaults to status. For status checks,
  timeout_ms is chosen by you; 0 means immediate check, max 15000.
prompt_result: |
  Status returns running with partial output, finished with exit code and
  bounded output, or cancelled. Cancel returns cancelled, already_completed, or
  job_not_found.
input_schema: |
  {
    "type": "object",
    "required": ["job_id"],
    "properties": {
      "op": {"type": "string", "enum": ["status", "cancel"], "description": "Operation. Defaults to status."},
      "job_id": {"type": "string", "description": "Background job id returned by a registered tool."},
      "timeout_ms": {"type": "integer", "description": "Wait budget for this status check; 0 means immediate check, max 15000."}
    }
  }
output_schema: |
  {
    "type": "object",
    "properties": {
      "job_id": {"type": "string", "description": "Echoed background job id."},
      "action": {"type": "string", "description": "Original registered action name."},
      "state": {"type": "string", "enum": ["running", "finished", "cancelled"], "description": "Current job state."},
      "exit_code": {"type": "integer", "description": "Process exit code when finished."},
      "waited_ms": {"type": "integer", "description": "Actual wait time."},
      "output_file": {"type": "string", "description": "Path where background output is stored."},
      "output": {"type": "string", "description": "Bounded final output when finished."},
      "partial_output": {"type": "string", "description": "Bounded output while still running."},
      "error": {"type": "string", "description": "job_id_required|job_not_found"}
    }
  }
example_json: |
  {
    "action": "tool_job_status",
    "intent": "Check whether the background registered tool finished.",
    "args": {
      "op": "status",
      "job_id": "tool_job_1782200000000",
      "timeout_ms": 10000
    }
  }

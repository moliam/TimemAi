kind: tool
id: memmgr
binding_type: builtin
binding_name: memmgr
summary: Unified local memory manager.
description: |
  Unified local memory manager. Use type=durable for long-lived user facts,
  type=raw_chat for UI-visible chat transcript, type=scratch for temporary notes.
prompt_synopsis: |
  memmgr type=durable op=<schema|sql|insert|update|upsert|delete> ...
  memmgr type=raw_chat op=<search|sql|delete> ...
  memmgr type=scratch op=<search|write|read|delete> ...
prompt_input: |
  Always include type and op. Choose one synopsis line above and fill only the
  arguments needed for that operation as fields in the args object. Use arrays
  for params. Use sql for durable reads. Use search_text for raw_chat and
  scratch search ops. Use sql and optional params for sql ops,
  content for durable writes and scratch notes, id for read/update/delete, and
  expected_version from a previous durable sql result before updating or
  deleting an existing durable row. SQL ops are read-only and limited to
  memories/chat_messages table inspection/search.
prompt_result: |
  Returns matching records, ids/versions for writes, conflict/error strings for
  unsafe writes, scratch ids for notes.
  memory_conflict means the durable row version changed; usually read the row
  again with durable sql
  before deciding whether to retry, merge, or report the conflict.
input_schema: |
  {
    "type": "object",
    "required": ["type", "op"],
    "properties": {
      "type": {
        "type": "string",
        "enum": ["durable", "raw_chat", "scratch"],
        "description": "Memory surface: durable user facts, UI-visible raw chat, scratch notes"
      },
      "op": {
        "type": "string",
        "description": "Operation. durable: schema|sql|insert|update|upsert|delete; raw_chat: search|sql|delete; scratch: search|write|read|delete"
      },
      "search_text": {"type": "string", "description": "Search text; empty is allowed for raw_chat/scratch recent listing."},
      "sql": {"type": "string", "description": "SELECT/WITH SELECT/PRAGMA table_info(memories|chat_messages) only."},
      "params": {"type": "array", "description": "Array matching SQL ? placeholders exactly."},
      "id": {"type": "string", "description": "Memory id, chat turn_id, or scratch id depending on type/op."},
      "expected_version": {"type": "integer", "description": "Durable row version from sql results; required when modifying/deleting an existing durable row."},
      "content": {"type": "string", "description": "Required for durable insert/update/upsert and scratch kind=notes."},
      "kind": {"type": "string", "enum": ["notes"], "description": "Scratch write mode."},
      "label": {"type": "string", "description": "Short retrieval label for scratch write."},
      "after_ms": {"type": "integer", "description": "Inclusive lower created_at_ms bound for raw_chat."},
      "before_ms": {"type": "integer", "description": "Exclusive upper created_at_ms bound for raw_chat."},
      "limit": {"type": "integer", "description": "Result cap."}
    },
    "x-required-when": [
      {"when": {"type": "durable", "op": "sql"}, "required": ["sql"]},
      {"when": {"type": "raw_chat", "op": "sql"}, "required": ["sql"]},
      {"when": {"type": "durable", "op": ["insert", "upsert"]}, "required": ["content"]},
      {"when": {"type": "durable", "op": "update"}, "required": ["id", "content"]},
      {"when": {"type": "durable", "op": "delete"}, "required": ["id"]},
      {"when": {"type": "scratch", "op": "write"}, "required": ["kind", "label"]},
      {"when": {"type": "scratch", "kind": "notes"}, "required": ["content"]},
      {"when": {"type": "scratch", "op": ["read", "delete"]}, "required": ["id"]}
    ],
    "x-required-any-when": [
      {"when": {"type": "raw_chat", "op": "delete"}, "required": ["id", "search_text"]}
    ]
  }
output_schema: |
  {
    "type": "object",
    "properties": {
      "type": {"type": "string", "description": "Echoed memory type."},
      "op": {"type": "string", "description": "Echoed operation when relevant."},
      "results": {"type": "string", "description": "Search/sql rows or none."},
      "id": {"type": "string", "description": "Durable memory id, chat turn id, or scratch id."},
      "version": {"type": "integer", "description": "Durable memory version after write/update/delete."},
      "deleted": {"type": "boolean", "description": "Delete result."},
      "error": {"type": "string", "description": "Validation/storage/conflict message."}
    }
  }
example_json: |
  {
    "memmgr": {
      "type": "durable",
      "op": "sql",
      "sql": "SELECT id, version, content FROM memories WHERE content LIKE ? LIMIT 5",
      "params": ["%project codename%"],
      "limit": 5
    }
  }

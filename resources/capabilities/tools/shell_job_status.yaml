kind: tool
id: shell_job_status
binding_type: builtin
binding_name: shell_job_status
description: Check a background shell job.
prompt_when: |
  Check a background shell job previously started by run_bash.
input_schema: |
  {
    "type": "object",
    "required": ["job_id", "timeout_ms"],
    "properties": {
      "job_id": {"type": "string", "description": "Background job id returned by run_bash."},
      "timeout_ms": {"type": "integer", "description": "Wait budget for this status check; 0 means immediate check, max 15000."}
    }
  }
output_schema: |
  {
    "type": "object",
    "properties": {
      "job_id": {"type": "string", "description": "Echoed background job id."},
      "state": {"type": "string", "enum": ["running", "finished"], "description": "Current job state."},
      "exit_code": {"type": "integer", "description": "Process exit code when finished."},
      "waited_ms": {"type": "integer", "description": "Actual wait time."},
      "output_file": {"type": "string", "description": "Path where background output is stored."},
      "output": {"type": "string", "description": "Bounded final output when finished."},
      "partial_output": {"type": "string", "description": "Bounded output while still running."},
      "error": {"type": "string", "description": "job_id_required|job_not_found"}
    }
  }
example_json: |
  {
    "action": "shell_job_status",
    "intent": "Check whether the background build finished.",
    "input": {
      "job_id": "job_1782200000000_1",
      "timeout_ms": 10000
    }
  }

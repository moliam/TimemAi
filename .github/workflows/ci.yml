name: CI

on:
  push:
    branches:
      - main
      - "0.9"
  pull_request:
    branches:
      - main
      - "0.9"

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install OS dependencies
        shell: bash
        run: |
          set -euo pipefail
          if [[ "$RUNNER_OS" == "Linux" ]]; then
            # Remove problematic Microsoft repos that may return 403
            sudo rm -f /etc/apt/sources.list.d/microsoft-prod.list \
                       /etc/apt/sources.list.d/azure-cli.list
            sudo apt-get update
            sudo apt-get install -y expect
          elif [[ "$RUNNER_OS" == "macOS" ]]; then
            if ! command -v expect >/dev/null 2>&1; then
              brew update
              brew install expect
            fi
          fi

      - name: Install stable Rust
        shell: bash
        run: |
          set -euo pipefail
          rustup toolchain install stable --profile minimal
          rustup default stable
          rustc --version
          cargo --version

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.7.0

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: web_ui/timem-web/pnpm-lock.yaml

      - name: Run production CI gate
        shell: bash
        run: scripts/ci.sh
